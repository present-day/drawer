name: Publish to npm

# Publishing the same version twice always fails. Run only when you tag a release
# (e.g. after merging a version bump: git tag v1.2.7 && git push origin v1.2.7),
# or use "Run workflow" from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    # If your Trusted Publisher on npmjs.com has an "Environment" set, un-comment and set the
    # same name. If you leave the comment below out, the npm side must have Environment empty.
    # environment: npm-registry-publish
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test:coverage
      - run: bun run build

      # Publishes via npm Trusted Publishing (OIDC). Do not set NODE_AUTH_TOKEN here:
      # a normal npm token with 2FA on "auth and writes" causes EOTP in CI. If you
      # must use a token instead, use an "Automation" classic token (no OTP) or a
      # Granular access token with publish, not a user publish token.
      #
      # The publish step must use the npm CLI, not `bun publish`: the OIDC
      # trusted-publishing token exchange is implemented in npm >= 11.5 only —
      # bun has no OIDC support and fails with "missing authentication"
      # (the v2.0.0 and v2.1.0 tag runs failed exactly this way).
      # No registry-url / NODE_AUTH_TOKEN here on purpose: setup-node's
      # registry-url writes an _authToken=${NODE_AUTH_TOKEN} line into .npmrc,
      # and any configured token (even empty) shadows the OIDC exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Publish to npm (OIDC)
        # --loglevel=verbose surfaces the trusted-publishing OIDC exchange so
        # misconfigurations show up as real diagnostics instead of a misleading
        # ENEEDAUTH / 404 (see https://github.com/npm/cli/issues/9088).
        run: npm publish --provenance --loglevel=verbose
