name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the "Environment name" on the package's Trusted Publisher settings (npmjs.com).
    environment: npm-registry-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing needs npm >= 11.5.1. Node 24 ships that; avoid
          # `npm install -g npm@…` on the runner (can MODULE_NOT_FOUND / break self-upgrade).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Publishes via npm Trusted Publishing (OIDC). Do not set NODE_AUTH_TOKEN here:
      # a normal npm token with 2FA on "auth and writes" causes EOTP in CI. If you
      # must use a token instead, use an "Automation" classic token (no OTP) or a
      # Granular access token with publish, not a user publish token.
      - name: Publish to npm (OIDC)
        run: npm publish --provenance
